<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel wyłączony – Parking Michał Kłos</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="../assets/images/logo2026.png" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f1f5f9;
      color: #1a2d4a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      max-width: 480px;
      background: #ffffff;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 10px 40px rgba(26,45,74,.08);
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin: 0 0 1rem; }
    p { line-height: 1.6; color: #475569; }
    a { color: #14b8a6; font-weight: 600; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      padding: .25rem .75rem;
      background: #fef3c7;
      color: #92400e;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">PANEL PRZENIESIONY</span>
    <h1>Zarządzanie zostało przeniesione do aplikacji Parking.OS</h1>
    <p>
      Status miejsc, komunikaty, godziny i cennik konfigurujesz teraz w aplikacji
      <strong>Parking.OS</strong> na komputerze (zakładka <em>Ustawienia → Parking</em>).
    </p>
    <p style="margin-top:1.5rem">
      <a href="../index.html">← Powrót na stronę główną</a>
    </p>
  </main>
</body>
</html>
